    <h1>สมัครสมาชิก</h1>
    <form action="">
        <label for="firstname">ชื่อจริง</label> <br>
        <input type="text" id="firstname" name="firstname"> <br>
        <label for="lastname">นามสกุล</label> <br>
        <input type="text" id="lastname" name="lastname"> <br>
        <label for="email">email</label> <br>
        <input type="email" name="email" id="email"> <br>
        <label for="gender">เพศ</label> <br>

        <input type="radio" name="gender" id="female">หญิง
        <input type="radio" name="gender" id="other">อื่นๆ
        <br>

        <label for="sport">กีฬา </label>

        <label for="game">เล่นเกม</label>
        <input type="checkbox" name="movie" id="movie">
        <label for="movie">ดูหนัง</label>
        <input type="checkbox" name="music" id="music">
        <label for="music">ฟังเพลง</label> <br>

        <button type="submit">ส่งข้อมูล</button>
        <button type="reset">ล้างข้อมูล</button>
