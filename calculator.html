<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>

<body>
    <h1>เครื่องคิดเลข</h1>
    <label for="num1">ตัวเลขที่1</label> <br>
    <input type="text" id="num1"><br>


    <label for="num2">ตัวเลขที่2</label> <br>
    <input type="text" id="num2"><br>

    <label for="operator">เครื่องหมาย</label> <br>
    <select id="operator">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select> <br><br>
    
    <button onclick="calculate()">คำนวณผลลัพธ์</button>

    <p id="result"></p>

    <script src="script.js"></script>
</body>

</html>
